name: coroot-graft-demo
services:
  checkout:
    image: hashicorp/http-echo:1.0.0
    command:
      - "-listen=:8080"
      - "-text=checkout-ok"

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - checkout
    volumes:
      - ./demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  loadgen:
    image: curlimages/curl:8.12.1
    depends_on:
      - frontend
    command:
      - sh
      - -lc
      - while true; do curl -fsS http://frontend:8080/checkout >/dev/null || true; sleep 1; done
