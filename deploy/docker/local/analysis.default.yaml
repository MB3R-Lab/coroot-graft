schema_version: "1.0"
seed: 42
trials: 12000
sampling_mode: independent_replica
failure_probability: 0.05

profiles:
  - name: steady-state
    sampling_mode: independent_replica
    failure_probability: 0.03
  - name: service-fault
    sampling_mode: independent_service
    failure_probability: 0.08
  - name: fixed-blast-radius
    sampling_mode: fixed_k_service_set
    fixed_k_failures: 1

gate:
  mode: warn
  default_action: warn
  evaluation_rule: all_profiles
  global_threshold: 0.985
  aggregate_threshold: 0.97
  cross_profile_aggregate_threshold: 0.965
